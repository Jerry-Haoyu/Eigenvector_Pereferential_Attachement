# This file was created automatically with `jupyter-book init --gh-pages`
name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    branches: [main]
env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install Jupyter Book (via myst)
        run: npm install -g jupyter-book
      
      # 1. TELL JUPYTER-BOOK TO RUN INSIDE YOUR SUBFOLDER
      - name: Build HTML Assets
        run: jupyter-book build documentation/
      
      # 2. UPDATE THE PATH TO FIND THE GENERATED HTML
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Jupyter Book places the build folder INSIDE the project directory
          path: './documentation/_build/html'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4